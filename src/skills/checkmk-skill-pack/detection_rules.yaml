# Checkmk Detection Rules
# Used to identify Checkmk context, symptoms, and issues across browser, terminal, and logs.

# --- Browser URL Patterns ---

- id: checkmk-detect-browser-url
  name: Checkmk Web Browser URL Detection
  description: Detect Checkmk web interface usage in browser
  detection_type: Browser
  pattern: 'checkmk|check_mk|checkmk/setup|checkmk/monitoring'
  confidence: 0.95
  technology_domain: Checkmk
  priority: 10
  flags: ''
  extract: null

- id: checkmk-detect-browser-setup
