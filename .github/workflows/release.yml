name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release (e.g., v1.0.0)"
        required: true
        type: string
      skip_release:
        description: "Skip GitHub release creation (build only)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: |
          cargo install tauri-cli --version "^2"

      # Install WiX Toolset for MSI builds
      - name: Install WiX Toolset
        run: |
          choco install wixtoolset -y

      # Install NSIS for NSIS installer builds
      - name: Install NSIS
        run: |
          choco install nsis -y

      # C++ build tools are pre-installed on windows-latest runner
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build Tauri app (MSI + NSIS)
        run: cargo tauri build --verbose
        working-directory: src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: wikilabs-copilot-installer
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-logs
          path: |
            target/release/build/**/output
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.skip_release != 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: wikilabs-copilot-installer
          path: dist/

      - name: Verify artifacts
        run: |
          echo "=== Artifacts in dist/ ==="
          ls -la dist/
          echo ""
          echo "=== File sizes ==="
          du -sh dist/*

      - name: Extract release notes from changelog
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          python3 -c "
          import re
          version = '${VERSION}'
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()
          pattern = rf'^## \[{version}\].*?(?=^## \[|\\Z)'
          match = re.search(pattern, content, re.MULTILINE | re.DOTALL)
          if match:
              notes = match.group(0)
          else:
              notes = 'See CHANGELOG.md for details.'
          with open('release_notes.md', 'w') as f:
              f.write(notes)
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Wiki Labs AI Copilot ${{ steps.tag.outputs.tag }}
          body_file: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'rc') }}
          files: |
            dist/*.msi
            dist/*.exe
          fail_on_unmatched_files: true