name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: src-tauri/package-lock.json

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install npm dependencies
        working-directory: src-tauri
        run: npm ci

      - name: Build frontend
        working-directory: src-tauri
        run: npm run build

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target x86_64-pc-windows-msvc
          tag: ${{ steps.tag.outputs.tag }}

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: wikilabs-copilot-installer
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload MSBuild logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-logs
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/build/**/output
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: wikilabs-copilot-installer
          path: dist/

      - name: Read changelog for release notes
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          # Extract changelog section for this version
          python3 -c "
          import re
          version = '$VERSION'
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()
          # Match version header and everything until next version
          pattern = rf'^## \[{version}\].*?(?=^## \[|\Z)'
          match = re.search(pattern, content, re.MULTILINE | re.DOTALL)
          if match:
              notes = match.group(0)
          else:
              notes = 'See CHANGELOG.md for details.'
          # Write to file to handle multiline
          with open('release_notes.md', 'w') as f:
              f.write(notes)
          "
          echo "body=$(cat release_notes.md)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Wiki Labs AI Copilot ${{ steps.tag.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'rc') }}
          files: |
            dist/*.msi
            dist/*.exe